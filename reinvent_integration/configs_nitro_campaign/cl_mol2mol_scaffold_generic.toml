        chkpt_file = "reinvent_integration/results/mol2mol_scaffold_generic_cl_adme/mol2mol_scaffold_generic_cl_stage1.chkpt"
        termination = "simple"
min_steps = 25
max_steps = 45
        [stage.scoring]
        type = "custom_sum"

        [[stage.scoring.component]]
        [stage.scoring.component.ExternalProcess]
        params.executable = "/home/nbhatta1/Desktop/qsar-project-Tzu/.venv/bin/python"
        params.args = "reinvent_integration/reinvent_qsar_adme_score.py --qsar-model reinvent_integration/artifacts/qsar_best_model.joblib --target-pic50 5.0 --clogp-low 1.0 --clogp-high 4.0 --logs-threshold -6.3 --microsome-clearance-max 85 --hepatocyte-clearance-max 95 --half-life-min 35 --qsar-weight 0.35 --clogp-weight 0.15 --solubility-weight 0.15 --microsome-weight 0.10 --hepatocyte-weight 0.10 --half-life-weight 0.15 --property-name qsar_adme_score" --disallow-smarts [N+](=O)[O-] --disallow-penalty 1.0"
        [[stage.scoring.component.ExternalProcess.endpoint]]
