        run_type = "staged_learning"
device = "cuda"
        [parameters]
        prior_file = "reinvent_integration/priors/mol2mol_scaffold_generic.prior"
        agent_file = "reinvent_integration/priors/mol2mol_scaffold_generic.prior"
smiles_file = "reinvent_integration/data/nitro_leads.smi"
sample_strategy = "multinomial"
batch_size = 64
        unique_sequences = true
        randomize_smiles = false
        summary_csv_prefix = "mol2mol_scaffold_generic_cl_adme"

        [learning_strategy]
        type = "dap"
        sigma = 64
        rate = 0.00005

