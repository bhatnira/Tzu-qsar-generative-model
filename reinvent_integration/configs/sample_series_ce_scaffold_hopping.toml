## Sampling: Scaffold Hopping from Series C/E fine-tuned model
## Agent trained to avoid the azaspiro motif → novel scaffolds, similar activity
run_type = "sampling"
device = "cpu"

[parameters]
model_file = "reinvent_integration/results/reinvent_series_ce_scaffold_hopping.chkpt"
