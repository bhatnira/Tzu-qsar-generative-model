run_type = "staged_learning"
device = "cpu"

[parameters]
prior_file = "REPLACE_WITH_LINKINVENT_PRIOR.model"
agent_file = ""
smiles_file = "REPLACE_WITH_LINKINVENT_PAIRS.smi"
output_file = "reinvent_integration/results/linkinvent_stage"
batch_size = 64
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[[stage]]
chkpt_file = "reinvent_integration/results/linkinvent_stage.chkpt"
termination = "simple"
min_steps = 50
max_steps = 500

[stage.scoring]
type = "custom_sum"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
params.executable = "/usr/bin/python3"
params.args = "reinvent_integration/reinvent_qsar_pharm_score.py --qsar-model reinvent_integration/artifacts/qsar_best_model.joblib --pharm-hypo pharm_outputs/hypotheses/AHHR_1.phypo --schrodinger /opt/schrodinger/schrodinger2026-1 --confgen-max 50 --confgen-energy-window 10.0 --property-name qsar_pharm_score"

[[stage.scoring.component.ExternalProcess.endpoint]]
name = "QSAR_Ph4_Combined"
weight = 1.0

[stage.scoring.component.ExternalProcess.endpoint.params]
property = "qsar_pharm_score"
