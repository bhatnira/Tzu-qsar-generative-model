## Sampling: Scaffold Generation from Series C/E fine-tuned model
## Agent trained to PRESERVE the azaspiro SMARTS (c1cncc(N2CCC3(CNC3)C2)c1)
## while varying decorations → analogues with the same core scaffold
run_type = "sampling"
device = "cpu"

[parameters]
model_file = "reinvent_integration/results/reinvent_series_ce_scaffold_generation.chkpt"
num_smiles = 2000
output_file = "reinvent_integration/results/generated_scaffold_generation/samples_scaffold_generation.csv"
unique_molecules = false
randomize_smiles = true
