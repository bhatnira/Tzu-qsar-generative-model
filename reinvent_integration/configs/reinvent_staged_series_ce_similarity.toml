run_type = "staged_learning"
device = "cpu"

[parameters]
prior_file = "reinvent_integration/priors/reinvent.prior"
agent_file = "reinvent_integration/results/motif_tuned_reinvent.model"
batch_size = 64
unique_sequences = true
randomize_smiles = false

[learning_strategy]
type = "dap"
sigma = 64
rate = 0.00005

[inception]
smiles_file = "reinvent_integration/data/motif_positive_seeds_filtered.smi"
memory_size = 512
sample_size = 64

[[stage]]
chkpt_file = "reinvent_integration/results/reinvent_series_ce_similarity.chkpt"
termination = "simple"
min_steps = 100
max_steps = 200

[stage.scoring]
type = "custom_sum"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
params.executable = "/home/nbhatta1/Desktop/qsar-project-Tzu/.venv/bin/python"
params.args = "reinvent_integration/reinvent_qsar_pharm_score.py --qsar-model reinvent_integration/artifacts/qsar_best_model.joblib --pharm-hypo pharm_outputs/hypotheses/pharm_hypo_find_common/pharm_hypo_find_common/hypotheses/AHHR_1.phypo --schrodinger /opt/schrodinger/schrodinger2026-1 --confgen-max 5 --confgen-energy-window 10.0 --ref-smiles-file reinvent_integration/data/series_ce_unique.smi --sim-weight 0.50 --qsar-weight 0.50 --pharm-weight 0.0 --property-name qsar_pharm_score"

[[stage.scoring.component.ExternalProcess.endpoint]]
name = "SeriesCE_Similarity_Guided"
weight = 1.0

[stage.scoring.component.ExternalProcess.endpoint.params]
property = "qsar_pharm_score"
