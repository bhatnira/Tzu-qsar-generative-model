run_type = "staged_learning"
device = "cpu"

[parameters]
prior_file = "reinvent_integration/results/series_ce_tuned_reinvent.model.8.chkpt"
agent_file = "reinvent_integration/results/series_ce_tuned_reinvent.model.8.chkpt"
batch_size = 64
unique_sequences = true
randomize_smiles = false

[learning_strategy]
type = "dap"
sigma = 64
rate = 0.00005

[inception]
smiles_file = "reinvent_integration/data/series_ce_unique.smi"
memory_size = 512
sample_size = 64

[[stage]]
chkpt_file = "reinvent_integration/results/reinvent_series_ce_guided_quick.chkpt"
termination = "simple"
min_steps = 40
max_steps = 80

[stage.scoring]
type = "custom_sum"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
params.executable = "/home/nbhatta1/Desktop/qsar-project-Tzu/.venv/bin/python"
params.args = "reinvent_integration/reinvent_qsar_pharm_score.py --qsar-model reinvent_integration/artifacts/qsar_best_model.joblib --pharm-hypo pharm_outputs/hypotheses/AHHR_1.phypo --schrodinger /opt/schrodinger/schrodinger2026-1 --confgen-max 50 --confgen-energy-window 10.0 --ref-smiles-file reinvent_integration/data/series_ce_unique.smi --sim-weight 0.3 --required-smarts c1cncc(N2CCC3(CNC3)C2)c1 --required-weight 0.5 --qsar-weight 0.1 --pharm-weight 0.1 --property-name qsar_pharm_score"

[[stage.scoring.component.ExternalProcess.endpoint]]
name = "SeriesCE_Guided_QSAR_Ph4"
weight = 1.0

[stage.scoring.component.ExternalProcess.endpoint.params]
property = "qsar_pharm_score"
